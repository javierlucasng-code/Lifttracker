<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --bg: #000000; --card: #111111; --accent: #00ff41; --selected-pill: #003311; --text-main: #f0f6fc; 
            --text-sub: #8b949e; --border: #333333; 
            --input-bg: #0a0a0a; --danger: #ff4d4d; --success: #00ff41; --warning: #e3b341;
            --glass-bg: rgba(15, 15, 15, 0.85);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text-main); 
            padding-bottom: calc(115px + env(safe-area-inset-bottom)); overflow-x: hidden; 
        }

        .screen { padding: 15px; display: none; max-width: 500px; margin: auto; animation: fadeIn 0.1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER & NAV */
        .calendar-header { margin-bottom: 15px; cursor: pointer; }
        .month-label { color: var(--accent); font-weight: bold; font-size: 22px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        
        .scroll-calendar { 
            display: flex; gap: 12px; padding: 10px 0 20px 0;
            overflow-x: auto; scroll-snap-type: x mandatory; 
            -webkit-overflow-scrolling: touch; scrollbar-width: none; 
        }
        .scroll-calendar::-webkit-scrollbar { display: none; }

        .date-pill {
            min-width: 55px; height: 85px; background: var(--card); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; border: 1px solid var(--border); transition: 0.2s;
            scroll-snap-align: start; position: relative;
        }
        .date-pill.active { background: var(--selected-pill); border-color: var(--accent); transform: scale(1.05); }
        .date-pill .date-circle { width: 28px; height: 28px; background: var(--input-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; margin-top: 5px; }

        /* DOT HIGHLIGHT */
        .has-workout::after {
            content: ''; position: absolute; bottom: 8px; width: 5px; height: 5px;
            background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent);
        }

        /* CUSTOM CALENDAR MODAL */
        #calendarModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: var(--card); width: 90%; max-width: 350px; border-radius: 25px;
            padding: 20px; border: 1px solid var(--border);
        }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day-name { font-size: 10px; color: var(--text-sub); font-weight: bold; padding-bottom: 10px; }
        .cal-cell { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; 
            font-size: 14px; border-radius: 10px; cursor: pointer; position: relative;
        }
        .cal-cell.today { color: var(--accent); font-weight: bold; }
        .cal-cell.selected { background: var(--accent); color: #000; font-weight: bold; }
        .cal-cell.has-log::after {
            content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px;
            background: var(--accent); border-radius: 50%;
        }
        .cal-cell.selected.has-log::after { background: #000; }

        /* REST OF UI */
        .timer-container { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .timer-display { font-size: 22px; font-weight: 900; color: var(--accent); font-family: monospace; }
        .timer-btn { background: var(--input-bg); border: 1px solid var(--border); color: white; padding: 8px 6px; border-radius: 8px; font-size: 10px; cursor: pointer; min-width: 45px; }

        .toggle-container { display: flex; background: var(--input-bg); border-radius: 10px; padding: 3px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; z-index: 1; }
        .toggle-slider { position: absolute; top: 3px; left: 3px; height: calc(100% - 6px); width: calc(33.33% - 4px); background: #1a1a1a; border-radius: 7px; transition: 0.3s; z-index: -1; }
        .pos-push { transform: translateX(0); } .pos-pull { transform: translateX(100%); } .pos-legs { transform: translateX(200%); }

        select, .set-row input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: white; font-size: 15px; outline: none; }
        .set-row { display: grid; grid-template-columns: 1fr 1fr 30px; gap: 12px; margin-bottom: 12px; align-items: center; }
        
        .btn-primary { background: var(--accent); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; }
        .btn-secondary { background: var(--card); color: white; border: 1px solid var(--border); width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 12px; }
        
        .navbar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; display: flex; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; padding: 12px 0; justify-content: space-around; z-index: 2000; }
        .nav-item { color: #555; cursor: pointer; flex: 1; display: flex; justify-content: center; }
        .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

<!-- Custom Calendar Modal -->
<div id="calendarModal" onclick="closeCalendar()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b id="modalMonthLabel" style="color:var(--accent)">MONTH</b>
            <button onclick="closeCalendar()" style="background:none; border:none; color:white; font-size:20px;">✕</button>
        </div>
        <div class="cal-grid" id="calendarGrid"></div>
    </div>
</div>

<div id="workoutScreen" class="screen" style="display: block;">
    <div class="calendar-header" onclick="openCalendar()">
        <span class="label-text">Select Date</span>
        <div class="month-label">
            <span id="currentDateDisplay">Today</span> <span style="font-size: 12px; color: var(--text-sub);">▼</span>
        </div>
    </div>

    <div class="scroll-calendar" id="weekBar"></div>
    
    <div id="freshnessHeatmap" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px;"></div>
    
    <div class="toggle-container">
        <div id="mainSlider" class="toggle-slider pos-push"></div>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Push', 'mainSlider', 'pos-push')">PUSH</button>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Pull', 'mainSlider', 'pos-pull')">PULL</button>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Legs', 'mainSlider', 'pos-legs')">LEGS</button>
    </div>
    
    <select id="exSelect"></select>
    <div id="logTable"></div>
    <button class="btn-secondary" onclick="addSetRow()">+ Add Set</button>

    <div class="timer-container">
        <div><span class="label-text" style="margin:0">Rest</span><div id="timerDisplay" class="timer-display">00:00</div></div>
        <div style="display:flex; gap:4px;">
            <button class="timer-btn" onclick="adjustTimer(-30)">-30s</button>
            <button id="timerToggle" class="timer-btn" style="color:var(--accent)" onclick="toggleTimer()">START</button>
            <button class="timer-btn" onclick="adjustTimer(30)">+30s</button>
        </div>
    </div>
    
    <button class="btn-primary" onclick="saveWorkout()">LOG SESSION</button>
</div>

<!-- Simple Nav -->
<nav class="navbar">
    <div class="nav-item active" onclick="showScreen('workout')"><svg viewBox="0 0 24 24"><path d="M6 12h12M6 8h12M6 16h12M2 12h2M20 12h2M5 4v16M19 4v16"/></svg></div>
    <div class="nav-item" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></div>
</nav>

<script>
let selectedDate = new Date();
let currentRoutine = 'Push';
let timeLeft = 0;
let timerRunning = false;
let timerInterval;

const splitExercises = {
    'Push': ['Flat Bench Press', 'Incline DB Press', 'Tricep Extension'],
    'Pull': ['Lat Pulldown', 'T-Bar Row', 'Bicep Curls'],
    'Legs': ['Leg Extensions', 'Hack Squat', 'Hamstring Curl']
};

// --- CUSTOM CALENDAR LOGIC ---
function openCalendar() {
    const modal = document.getElementById('calendarModal');
    const grid = document.getElementById('calendarGrid');
    const monthLabel = document.getElementById('modalMonthLabel');
    const logs = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    
    grid.innerHTML = '';
    modal.style.display = 'flex';
    
    const year = selectedDate.getFullYear();
    const month = selectedDate.getMonth();
    monthLabel.innerText = selectedDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

    // Day headers
    ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="cal-day-name">${d}</div>`);

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // Padding for start of month
    for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;

    for(let d=1; d<=daysInMonth; d++) {
        const dateObj = new Date(year, month, d);
        const hasLog = logs.some(l => new Date(l.date).toDateString() === dateObj.toDateString());
        const isSelected = dateObj.toDateString() === selectedDate.toDateString();
        const isToday = dateObj.toDateString() === new Date().toDateString();

        const cell = document.createElement('div');
        cell.className = `cal-cell ${isSelected ? 'selected' : ''} ${hasLog ? 'has-log' : ''} ${isToday ? 'today' : ''}`;
        cell.innerText = d;
        cell.onclick = () => { selectedDate = dateObj; renderWeekBar(); closeCalendar(); };
        grid.appendChild(cell);
    }
}

function closeCalendar() { document.getElementById('calendarModal').style.display = 'none'; }

// --- WEEK BAR LOGIC ---
function renderWeekBar() {
    const weekBar = document.getElementById('weekBar');
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    weekBar.innerHTML = '';
    document.getElementById('currentDateDisplay').innerText = selectedDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    
    const start = new Date(selectedDate);
    start.setDate(selectedDate.getDate() - 10);
    
    for (let i = 0; i < 21; i++) {
        const day = new Date(start);
        day.setDate(start.getDate() + i);
        const hasLog = db.some(l => new Date(l.date).toDateString() === day.toDateString());
        const isSel = day.toDateString() === selectedDate.toDateString();
        
        const pill = document.createElement('div');
        pill.className = `date-pill ${isSel ? 'active' : ''} ${hasLog ? 'has-workout' : ''}`;
        pill.onclick = () => { selectedDate = day; renderWeekBar(); };
        pill.innerHTML = `<span class="label-text" style="margin:0; font-size:10px;">${day.toLocaleDateString('en-US',{weekday:'short'})}</span><div class="date-circle">${day.getDate()}</div>`;
        weekBar.appendChild(pill);
        if(isSel) setTimeout(() => pill.scrollIntoView({ behavior: 'smooth', inline: 'center' }), 100);
    }
}

// --- APP CORE ---
function setRoutine(name, sliderId, posClass) {
    currentRoutine = name;
    document.getElementById(sliderId).className = 'toggle-slider ' + posClass;
    updateDropdown();
}

function updateDropdown() {
    const select = document.getElementById('exSelect');
    select.innerHTML = splitExercises[currentRoutine].map(e => `<option value="${e}">${e}</option>`).join('');
}

function addSetRow() {
    const div = document.createElement('div');
    div.className = 'set-row';
    div.innerHTML = `<input type="number" placeholder="kg" class="ki"><input type="number" placeholder="reps" class="ri"><button style="background:none; border:none; color:var(--danger);" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('logTable').appendChild(div);
}

function saveWorkout() {
    const ex = document.getElementById('exSelect').value;
    const sets = Array.from(document.querySelectorAll('.set-row')).map(r => ({
        kg: parseFloat(r.querySelector('.ki').value) || 0, 
        reps: parseInt(r.querySelector('.ri').value) || 0
    })).filter(s => s.kg > 0);
    
    if(!sets.length) return;
    let db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    db.push({ name: ex, routine: currentRoutine, date: selectedDate.toISOString(), sets });
    localStorage.setItem('gymLogs', JSON.stringify(db));
    
    document.getElementById('logTable').innerHTML = ""; 
    addSetRow();
    updateHeatmap();
    renderWeekBar();
    alert("Logged!");
}

function updateHeatmap() {
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    const container = document.getElementById('freshnessHeatmap');
    container.innerHTML = '';
    ['Push', 'Pull', 'Legs'].forEach(r => {
        const last = db.filter(l => l.routine === r).sort((a,b) => new Date(b.date) - new Date(a.date))[0];
        const hrs = last ? Math.floor((new Date() - new Date(last.date)) / 3600000) : '--';
        container.innerHTML += `<div style="border:1px solid var(--border); padding:10px; border-radius:12px; text-align:center;"><span class="label-text" style="font-size:9px;">${r}</span><br><b>${hrs}h</b></div>`;
    });
}

function updateTimerDisplay() {
    const mins = Math.floor(timeLeft / 60); const secs = timeLeft % 60;
    document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
}
function toggleTimer() {
    const btn = document.getElementById('timerToggle');
    if (timerRunning) { clearInterval(timerInterval); btn.innerText = "START"; } 
    else {
        if (timeLeft <= 0) return;
        timerInterval = setInterval(() => { if (timeLeft > 0) { timeLeft--; updateTimerDisplay(); } else { clearInterval(timerInterval); alert("Time's up!"); resetTimer(); }}, 1000);
        btn.innerText = "STOP";
    }
    timerRunning = !timerRunning;
}
function resetTimer() { clearInterval(timerInterval); timerRunning = false; timeLeft = 0; updateTimerDisplay(); }
function adjustTimer(amt) { timeLeft = Math.max(0, timeLeft + amt); updateTimerDisplay(); }

renderWeekBar(); updateDropdown(); addSetRow(); updateHeatmap();
</script>
</body>
</html>
