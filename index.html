<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --bg: #000000; --card: #111111; --accent: #00ff41; --selected-pill: #003311; --text-main: #f0f6fc; 
            --text-sub: #8b949e; --border: #333333; 
            --input-bg: #0a0a0a; --danger: #ff4d4d; --success: #00ff41; --warning: #e3b341;
            --glass-bg: rgba(15, 15, 15, 0.85);
            --pull: #0088ff;
            --legs: #ff4d4d;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text-main); 
            padding-bottom: calc(115px + env(safe-area-inset-bottom)); overflow-x: hidden; 
        }

        .screen { padding: 15px; display: none; max-width: 500px; margin: auto; animation: fadeIn 0.1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI COMPONENTS */
        .calendar-header { margin-bottom: 15px; cursor: pointer; }
        .month-label { color: var(--accent); font-weight: bold; font-size: 22px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        
        .scroll-calendar { 
            display: flex; gap: 12px; padding: 10px 0 20px 0;
            overflow-x: auto; scroll-snap-type: x mandatory; 
            -webkit-overflow-scrolling: touch; scrollbar-width: none; 
        }
        .scroll-calendar::-webkit-scrollbar { display: none; }

        .date-pill {
            min-width: 55px; height: 85px; background: var(--card); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; border: 1px solid var(--border); transition: 0.2s;
            scroll-snap-align: start; position: relative;
        }
        .date-pill.active { background: var(--selected-pill); border-color: var(--accent); transform: scale(1.05); }
        .date-pill .date-circle { width: 28px; height: 28px; background: var(--input-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; margin-top: 5px; }

        .has-workout::after {
            content: ''; position: absolute; bottom: 10px; width: 6px; height: 6px;
            background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent);
        }

        /* MODALS */
        #calendarModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: var(--card); width: 90%; max-width: 350px; border-radius: 25px;
            padding: 20px; border: 1px solid var(--border);
        }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day-name { font-size: 10px; color: var(--text-sub); font-weight: bold; padding-bottom: 10px; }
        .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; border-radius: 10px; cursor: pointer; position: relative; }
        .cal-cell.today { color: var(--accent); font-weight: bold; border: 1px solid var(--accent); }
        .cal-cell.selected { background: var(--accent); color: #000; font-weight: bold; }
        .cal-cell.has-log::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }

        .recovery-card { border: 1px solid var(--border); padding: 12px 8px; border-radius: 15px; text-align: center; background: var(--card); position: relative; overflow: hidden; }
        .recovery-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); transition: width 0.5s ease; }

        /* BUTTONS & CARDS */
        .btn-primary { background: var(--accent); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-bottom: 15px; }
        .btn-secondary { background: var(--card); color: white; border: 1px solid var(--border); width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 12px; }
        .btn-danger { background: rgba(255, 77, 77, 0.05); color: var(--danger); border: 1px solid var(--danger); width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 900; }
        .workout-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 12px; }
        .label-text { font-size: 11px; color: var(--text-sub); text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }

        .toggle-container { display: flex; background: var(--input-bg); border-radius: 10px; padding: 3px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; z-index: 1; overflow: hidden;}
        .toggle-slider { position: absolute; top: 3px; left: 3px; height: calc(100% - 6px); width: calc(33.33% - 4px); background: #1a1a1a; border-radius: 7px; transition: 0.3s; z-index: -1; }
        .pos-push { transform: translateX(0); } .pos-pull { transform: translateX(100%); } .pos-legs { transform: translateX(200%); }

        /* ANALYTICS SUB-NAV */
        .stats-nav { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .stats-nav::-webkit-scrollbar { display: none; }
        .stats-nav-item { 
            padding: 8px 16px; background: var(--card); border: 1px solid var(--border); 
            border-radius: 20px; font-size: 11px; font-weight: bold; color: var(--text-sub); 
            white-space: nowrap; cursor: pointer; transition: 0.2s;
        }
        .stats-nav-item.active { background: var(--selected-pill); border-color: var(--accent); color: var(--accent); }

        /* HISTORY STYLES */
        .history-month-header {
            color: var(--accent);
            font-size: 18px;
            font-weight: 900;
            margin: 25px 0 10px 0;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }
        .history-split-group { margin-bottom: 15px; }
        .history-split-label {
            font-size: 10px;
            font-weight: bold;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .history-split-label::after { content: ''; flex: 1; height: 1px; background: #222; }

        /* NAVBAR */
        .navbar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; display: flex; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; padding: 12px 0; justify-content: space-around; z-index: 2000; }
        .nav-item { color: #555; cursor: pointer; flex: 1; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .nav-item svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2.2; fill: none; }
        .nav-item.active { color: var(--accent); transform: translateY(-4px); }

        .timer-btn { background: var(--input-bg); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 8px; font-size: 11px; flex: 1; font-weight: bold; }
        .timer-btn.active { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<div id="calendarModal" onclick="closeCalendar()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b id="modalMonthLabel" style="color:var(--accent)">MONTH</b>
            <button onclick="closeCalendar()" style="background:none; border:none; color:white; font-size:20px;">✕</button>
        </div>
        <div class="cal-grid" id="calendarGrid"></div>
    </div>
</div>

<!-- WORKOUT SCREEN -->
<div id="workoutScreen" class="screen" style="display: block;">
    <div class="calendar-header" onclick="openCalendar()">
        <span class="label-text">Select Date</span>
        <div class="month-label">
            <span id="currentDateDisplay">Today</span> <span style="font-size: 12px; color: var(--text-sub);">▼</span>
        </div>
    </div>
    <div class="scroll-calendar" id="weekBar"></div>
    
    <div id="freshnessHeatmap" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px;"></div>

    <div class="toggle-container">
        <div id="mainSlider" class="toggle-slider pos-push"></div>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Push', 'mainSlider', 'pos-push')">PUSH</button>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Pull', 'mainSlider', 'pos-pull')">PULL</button>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Legs', 'mainSlider', 'pos-legs')">LEGS</button>
    </div>

    <select id="exSelect" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); background:var(--input-bg); color:white; margin-bottom:15px;"></select>
    
    <div id="logTable"></div>
    <button class="btn-secondary" onclick="addSetRow()">+ Add Set</button>

    <button class="btn-primary" onclick="saveWorkout()">LOG SESSION</button>

    <div class="workout-card">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
            <div>
                <span class="label-text" style="margin:0">Rest Timer</span>
                <div id="timerDisplay" style="font-size: 32px; font-weight: 900; color: var(--accent); font-family: monospace; line-height: 1;">00:00</div>
            </div>
            <button id="timerToggle" onclick="toggleTimer()" style="background: var(--selected-pill); border: 1px solid var(--accent); color: var(--accent); padding: 12px 25px; border-radius: 12px; font-weight: 900; font-size: 14px;">START</button>
        </div>
        <div style="display: flex; gap: 6px;">
            <button class="timer-btn" onclick="adjustTimer(-30)">-30s</button>
            <button class="timer-btn" onclick="adjustTimer(30)">+30s</button>
            <button class="timer-btn" onclick="adjustTimer(60)">+1m</button>
            <button class="timer-btn" style="border-color: var(--danger); color: var(--danger);" onclick="resetTimer()">RESET</button>
        </div>
    </div>
</div>

<!-- HISTORY SCREEN (UPDATED WITH DROPDOWN) -->
<div id="historyScreen" class="screen">
    <div style="position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
        <h2 style="color: var(--accent); margin: 0;">History</h2>
        <select id="historyMonthJump" onchange="jumpToMonth(this.value)" style="padding: 8px; border-radius: 8px; background: var(--card); color: var(--accent); border: 1px solid var(--border); font-size: 12px; font-weight: bold;">
            <option value="">Jump to...</option>
        </select>
    </div>
    <div id="historyLogs"></div>
</div>

<!-- STATS SCREEN -->
<div id="statsScreen" class="screen">
    <h2 style="color: var(--accent); margin-bottom: 20px;">Performance</h2>
    
    <div class="stats-nav">
        <div class="stats-nav-item active" onclick="filterStats('All', this)">All Splits</div>
        <div class="stats-nav-item" onclick="filterStats('Push', this)">Push</div>
        <div class="stats-nav-item" onclick="filterStats('Pull', this)">Pull</div>
        <div class="stats-nav-item" onclick="filterStats('Legs', this)">Legs</div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
        <div class="workout-card" style="margin-bottom: 0; text-align: center;">
            <span class="label-text" id="volHeader">Total Volume (7d)</span>
            <div id="totalVolLabel" style="font-size: 20px; font-weight: 900; color: var(--text-main);">0kg</div>
        </div>
        <div class="workout-card" style="margin-bottom: 0; text-align: center;">
            <span class="label-text" id="sessionHeader">Sessions (7d)</span>
            <div id="sessionCountLabel" style="font-size: 20px; font-weight: 900; color: var(--accent);">0</div>
        </div>
    </div>

    <div class="workout-card">
        <span class="label-text">Volume by Split (7d)</span>
        <div style="height: 180px;"><canvas id="splitVolumeChart"></canvas></div>
    </div>

    <div class="workout-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span class="label-text" style="margin:0">Volume Trend</span>
            <span id="trendLabel" style="font-size: 10px; background: var(--selected-pill); color: var(--accent); padding: 2px 8px; border-radius: 10px;">Showing All</span>
        </div>
        <div style="height: 200px;"><canvas id="progressChart"></canvas></div>
    </div>

    <div class="workout-card">
        <span class="label-text">Split Distribution</span>
        <div style="height: 160px;"><canvas id="distributionChart"></canvas></div>
    </div>
</div>

<!-- PROFILE SCREEN -->
<div id="profileScreen" class="screen">
    <h2 style="color: var(--accent);">Settings</h2>
    <div class="workout-card">
        <button class="btn-secondary" onclick="exportData()">DOWNLOAD BACKUP</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
        <button class="btn-secondary" onclick="document.getElementById('importFile').click()">UPLOAD DATA</button>
        <button class="btn-danger" onclick="resetDatabase()">RESET DATA</button>
    </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="showScreen('workout')"><svg viewBox="0 0 24 24"><path d="M6 12h12M6 8h12M6 16h12M2 12h2M20 12h2M5 4v16M19 4v16"/></svg></div>
    <div class="nav-item" onclick="showScreen('history')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
    <div class="nav-item" onclick="showScreen('stats')"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
    <div class="nav-item" onclick="showScreen('profile')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
</nav>

<script>
// INITIAL DATA & GLOBALS
let selectedDate = new Date();
let currentRoutine = 'Push';
let myChart = null;
let distChart = null;
let splitVolChart = null;
let currentStatFilter = 'All';
let timeLeft = 0;
let timerRunning = false;
let timerInterval;

const splitExercises = {
    'Push': ['Flat Bench Press', 'Incline Press', 'Tricep Extension', 'Overhead Extension', 'Overhead Press', 'Lateral Raise'],
    'Pull': ['Lat Pulldown', 'T-Bar Row', 'Iso-Lateral Low Row', 'Bicep Curls', 'Reverse Curls', 'Rear Delt Flies'],
    'Legs': ['Leg Extensions', 'Hack Squat', 'Hamstring Curl', 'RDL', 'Abdductors', 'Calf Raises', 'Abs']
};

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id + 'Screen').style.display = 'block';
    if(id === 'workout') { renderWeekBar(); updateHeatmap(); }
    if(id === 'history') renderHistory();
    if(id === 'stats') renderStats();
    document.querySelector(`.nav-item[onclick="showScreen('${id}')"]`).classList.add('active');
}

// CALENDAR LOGIC
function openCalendar() {
    const modal = document.getElementById('calendarModal');
    const grid = document.getElementById('calendarGrid');
    const logs = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    grid.innerHTML = '';
    modal.style.display = 'flex';
    ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="cal-day-name">${d}</div>`);
    const year = selectedDate.getFullYear(), month = selectedDate.getMonth();
    document.getElementById('modalMonthLabel').innerText = selectedDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
    for(let i=0; i<new Date(year, month, 1).getDay(); i++) grid.innerHTML += `<div></div>`;
    for(let d=1; d<=new Date(year, month + 1, 0).getDate(); d++) {
        const dateObj = new Date(year, month, d);
        const hasLog = logs.some(l => new Date(l.date).toDateString() === dateObj.toDateString());
        const cell = document.createElement('div');
        cell.className = `cal-cell ${dateObj.toDateString() === selectedDate.toDateString() ? 'selected' : ''} ${hasLog ? 'has-log' : ''}`;
        cell.innerText = d;
        cell.onclick = () => { selectedDate = dateObj; renderWeekBar(); closeCalendar(); };
        grid.appendChild(cell);
    }
}
function closeCalendar() { document.getElementById('calendarModal').style.display = 'none'; }

// WORKOUT LOGGING
function renderWeekBar() {
    const weekBar = document.getElementById('weekBar');
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    weekBar.innerHTML = '';
    document.getElementById('currentDateDisplay').innerText = selectedDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    const start = new Date(selectedDate); start.setDate(selectedDate.getDate() - 10);
    for (let i = 0; i < 21; i++) {
        const day = new Date(start); day.setDate(start.getDate() + i);
        const pill = document.createElement('div');
        pill.className = `date-pill ${day.toDateString() === selectedDate.toDateString() ? 'active' : ''} ${db.some(l => new Date(l.date).toDateString() === day.toDateString()) ? 'has-workout' : ''}`;
        pill.innerHTML = `<span class="label-text" style="margin:0; font-size:10px;">${day.toLocaleDateString('en-US',{weekday:'short'})}</span><div class="date-circle">${day.getDate()}</div>`;
        pill.onclick = () => { selectedDate = day; renderWeekBar(); };
        weekBar.appendChild(pill);
        if(day.toDateString() === selectedDate.toDateString()) setTimeout(() => pill.scrollIntoView({ behavior: 'smooth', inline: 'center' }), 100);
    }
}

function setRoutine(n, s, p) { currentRoutine = n; document.getElementById(s).className = 'toggle-slider ' + p; updateDropdown(); }
function updateDropdown() { document.getElementById('exSelect').innerHTML = splitExercises[currentRoutine].map(e => `<option value="${e}">${e}</option>`).join(''); }

function addSetRow() {
    const div = document.createElement('div'); div.className = 'set-row'; div.style = 'display:grid; grid-template-columns: 1fr 1fr 30px; gap:10px; margin-bottom:10px;';
    div.innerHTML = `<input type="number" placeholder="kg" class="ki" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:white;"><input type="number" placeholder="reps" class="ri" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:white;"><button style="background:none; border:none; color:var(--danger);" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('logTable').appendChild(div);
}

function saveWorkout() {
    const sets = Array.from(document.querySelectorAll('.set-row')).map(r => ({ 
        kg: parseFloat(r.querySelector('.ki').value) || 0, 
        reps: parseInt(r.querySelector('.ri').value) || 0 
    })).filter(s => s.kg > 0);
    if(!sets.length) return;
    let db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    db.push({ name: document.getElementById('exSelect').value, routine: currentRoutine, date: selectedDate.toISOString(), sets });
    localStorage.setItem('gymLogs', JSON.stringify(db));
    document.getElementById('logTable').innerHTML = ""; addSetRow(); updateHeatmap(); renderWeekBar(); alert("Logged!");
}

// REST TIMER
function updateTimerDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
}
function toggleTimer() {
    const btn = document.getElementById('timerToggle');
    if (timerRunning) {
        clearInterval(timerInterval);
        btn.innerText = "START"; btn.style.borderColor = "var(--accent)"; btn.style.color = "var(--accent)";
    } else {
        if (timeLeft <= 0) timeLeft = 90;
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            if (timeLeft > 0) { timeLeft--; updateTimerDisplay(); } 
            else { clearInterval(timerInterval); alert("Rest Finished!"); timerRunning = false; btn.innerText = "START"; }
        }, 1000);
        btn.innerText = "STOP"; btn.style.borderColor = "var(--danger)"; btn.style.color = "var(--danger)";
    }
    timerRunning = !timerRunning;
}
function adjustTimer(amt) { timeLeft = Math.max(0, timeLeft + amt); updateTimerDisplay(); }
function resetTimer() { clearInterval(timerInterval); timerRunning = false; timeLeft = 0; updateTimerDisplay(); document.getElementById('timerToggle').innerText = "START"; }

// JUMP TO MONTH LOGIC
function jumpToMonth(monthId) {
    if (!monthId) return;
    const element = document.getElementById(monthId);
    if (element) {
        element.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

// HISTORY - UPDATED FOR SPLITS & MONTHS
function renderHistory() {
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    const historyContainer = document.getElementById('historyLogs');
    const monthJump = document.getElementById('historyMonthJump');
    
    historyContainer.innerHTML = '';
    monthJump.innerHTML = '<option value="">Jump to...</option>';
    
    if (db.length === 0) { historyContainer.innerHTML = '<p style="color:var(--text-sub); text-align:center;">No sessions logged yet.</p>'; return; }

    const sortedLogs = db.sort((a, b) => new Date(b.date) - new Date(a.date));
    const groups = {};
    sortedLogs.forEach(log => {
        const date = new Date(log.date);
        const monthYear = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        if (!groups[monthYear]) groups[monthYear] = { Push: [], Pull: [], Legs: [] };
        if (groups[monthYear][log.routine]) groups[monthYear][log.routine].push(log);
    });

    for (const [month, splits] of Object.entries(groups)) {
        // Create unique ID for the dropdown navigation
        const monthId = month.replace(/\s+/g, '');
        
        // Add option to dropdown
        const opt = document.createElement('option');
        opt.value = monthId;
        opt.innerText = month;
        monthJump.appendChild(opt);

        const monthHeader = document.createElement('div');
        monthHeader.className = 'history-month-header';
        monthHeader.id = monthId; // ID for scrolling
        monthHeader.innerText = month;
        historyContainer.appendChild(monthHeader);

        ['Push', 'Pull', 'Legs'].forEach(splitName => {
            const splitLogs = splits[splitName];
            if (splitLogs.length > 0) {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'history-split-group';
                let color = splitName === 'Pull' ? "var(--pull)" : (splitName === 'Legs' ? "var(--legs)" : "var(--accent)");
                groupDiv.innerHTML = `<div class="history-split-label" style="color:${color}">${splitName}</div>`;
                splitLogs.forEach(l => {
                    const logDate = new Date(l.date).toLocaleDateString(undefined, { day: 'numeric', weekday: 'short' });
                    groupDiv.innerHTML += `
                        <div class="workout-card">
                            <span class="label-text">${logDate}</span>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <b style="font-size:15px;">${l.name}</b> 
                                <span style="font-size:12px; color:var(--text-sub); background:var(--input-bg); padding:4px 8px; border-radius:6px;">${l.sets.length} Sets</span>
                            </div>
                        </div>`;
                });
                historyContainer.appendChild(groupDiv);
            }
        });
    }
}

// ANALYTICS
function filterStats(split, element) {
    currentStatFilter = split;
    document.querySelectorAll('.stats-nav-item').forEach(i => i.classList.remove('active'));
    element.classList.add('active');
    renderStats();
}

function renderStats() {
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    const dailyVolume = {};
    const splitCounts = { Push: 0, Pull: 0, Legs: 0 };
    const splitVolumes = { Push: 0, Pull: 0, Legs: 0 };
    let filteredVol7d = 0;
    const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

    db.forEach(log => {
        const logDate = new Date(log.date);
        const vol = log.sets.reduce((s, set) => s + (set.kg * set.reps), 0);
        const d = logDate.toLocaleDateString();
        const matchesFilter = (currentStatFilter === 'All' || log.routine === currentStatFilter);
        if (splitCounts.hasOwnProperty(log.routine)) splitCounts[log.routine]++;
        if (matchesFilter) {
            dailyVolume[d] = (dailyVolume[d] || 0) + vol;
            if (logDate >= sevenDaysAgo) {
                filteredVol7d += vol;
                if (splitVolumes.hasOwnProperty(log.routine)) splitVolumes[log.routine] += vol;
            }
        }
    });

    document.getElementById('volHeader').innerText = currentStatFilter === 'All' ? 'Total Volume (7d)' : `${currentStatFilter} Volume (7d)`;
    document.getElementById('totalVolLabel').innerText = filteredVol7d.toLocaleString() + 'kg';
    document.getElementById('sessionCountLabel').innerText = Object.keys(dailyVolume).filter(d => new Date(d) >= sevenDaysAgo).length;
    document.getElementById('trendLabel').innerText = `Showing ${currentStatFilter}`;

    if(splitVolChart) splitVolChart.destroy();
    splitVolChart = new Chart(document.getElementById('splitVolumeChart').getContext('2d'), {
        type: 'bar',
        data: { labels: ['Push', 'Pull', 'Legs'], datasets: [{ data: [splitVolumes.Push, splitVolumes.Pull, splitVolumes.Legs], backgroundColor: ['#00ff41', '#0088ff', '#ff4d4d'], borderRadius: 8 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#222' }, ticks: { color: '#8b949e', font: { size: 10 } } }, x: { grid: { display: false }, ticks: { color: '#f0f6fc', font: { weight: 'bold' } } } } }
    });

    const sortedDates = Object.keys(dailyVolume).sort((a,b) => new Date(a) - new Date(b)).slice(-7);
    if(myChart) myChart.destroy();
    let lineColor = currentStatFilter === 'Pull' ? '#0088ff' : (currentStatFilter === 'Legs' ? '#ff4d4d' : '#00ff41');
    myChart = new Chart(document.getElementById('progressChart').getContext('2d'), {
        type: 'line',
        data: { labels: sortedDates.map(d => d.split('/')[0] + '/' + d.split('/')[1]), datasets: [{ data: sortedDates.map(d => dailyVolume[d]), borderColor: lineColor, borderWidth: 3, tension: 0.4, fill: true, backgroundColor: lineColor + '1A' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#8b949e' } } } }
    });

    if(distChart) distChart.destroy();
    distChart = new Chart(document.getElementById('distributionChart').getContext('2d'), {
        type: 'doughnut',
        data: { labels: ['Push', 'Pull', 'Legs'], datasets: [{ data: [splitCounts.Push, splitCounts.Pull, splitCounts.Legs], backgroundColor: ['#00ff41', '#0088ff', '#ff4d4d'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { position: 'right', labels: { color: '#8b949e', font: { size: 11 } } } } }
    });
}

function updateHeatmap() {
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    const container = document.getElementById('freshnessHeatmap'); container.innerHTML = '';
    ['Push', 'Pull', 'Legs'].forEach(r => {
        const last = db.filter(l => l.routine === r).sort((a,b) => new Date(b.date) - new Date(a.date))[0];
        let prog = 100, stat = "READY", col = "var(--accent)";
        if(last) {
            const hrs = (new Date() - new Date(last.date)) / 3600000;
            if(hrs < 48) { prog = (hrs/48)*100; stat = "RECOVERING"; col = "var(--warning)"; }
        }
        container.innerHTML += `<div class="recovery-card"><span class="label-text" style="font-size:9px;">${r}</span><div style="font-weight:900; font-size:11px; color:${col};">${stat}</div><div class="recovery-progress" style="width:${prog}%; background:${col};"></div></div>`;
    });
}

function exportData() { const b = new Blob([localStorage.getItem('gymLogs') || '[]'], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `backup.json`; a.click(); }
function importData(e) {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader(); r.onload = (ev) => { localStorage.setItem('gymLogs', ev.target.result); location.reload(); }; r.readAsText(f);
}
function resetDatabase() { if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); } }

renderWeekBar(); updateDropdown(); addSetRow(); updateHeatmap();
</script>
</body>
