<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Tracker</title>
    
    <!-- PWA & Mobile Optimization -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">

    <style>
        :root { 
            --bg: #090a0f; --card: #161b22; --accent: #00f2fe; --text-main: #f0f6fc; 
            --text-sub: #8b949e; --border: #30363d; --input-bg: #0d1117; --danger: #ff4d4d; --success: #2ea44f; --gold: #ffd700; --warning: #e3b341;
        }
        body { 
            margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); 
            padding-bottom: calc(100px + env(safe-area-inset-bottom)); overflow-x: hidden; 
        }

        .screen { padding: 20px; display: none; max-width: 500px; margin: auto; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .navbar { 
            position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(13, 17, 23, 0.95); 
            backdrop-filter: blur(10px); border-top: 1px solid var(--border); padding-top: 15px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); justify-content: space-around; z-index: 1000; 
        }
        .nav-item { color: #484f58; font-size: 26px; cursor: pointer; flex: 1; text-align: center; }
        .nav-item.active { color: var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }

        select, input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: white; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; }
        .btn-primary { background: var(--accent); color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; }
        .btn-secondary { background: var(--card); color: white; border: 1px solid var(--border); width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 10px; }

        #exportReminder { background: rgba(227, 179, 65, 0.1); border: 1px solid var(--warning); color: var(--warning); padding: 12px; border-radius: 12px; margin-bottom: 15px; display: none; align-items: center; justify-content: space-between; font-size: 12px; }
        #successToast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; display: none; z-index: 2000; }

        .workout-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        .vol-target-bar { height: 10px; background: var(--input-bg); border-radius: 5px; margin-top: 8px; overflow: hidden; border: 1px solid var(--border); }
        .vol-progress { height: 100%; transition: width 0.3s ease; }
        
        .heatmap-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .heat-cell { padding: 10px; border-radius: 12px; text-align: center; border: 1px solid var(--border); background: var(--input-bg); }
        .heat-label { font-size: 10px; color: var(--text-sub); text-transform: uppercase; display: block; margin-bottom: 4px; }

        .timer-container { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border); text-align: center; }
        #timerDisplay { font-family: monospace; font-size: 2.8rem; color: var(--accent); margin: 5px 0; font-weight: bold; }
        .timer-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-date { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 13px; cursor: pointer; position: relative; }
        .has-workout::after { content: ""; position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }
        .selected-date { background: var(--accent); color: #000; font-weight: bold; }

        canvas { background: var(--card); border-radius: 20px; border: 1px solid var(--border); width: 100%; height: 220px; margin-top: 15px; }
        .toggle-container { display: flex; background: var(--input-bg); border-radius: 12px; padding: 4px; margin-bottom: 15px; border: 1px solid var(--border); }
        .toggle-btn { flex: 1; border: none; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-sub); }
        .toggle-btn.active { background: var(--card); color: var(--accent); }
    </style>
</head>
<body>

<div id="successToast">EXERCISE LOGGED!</div>

<!-- WORKOUT SCREEN -->
<div id="workoutScreen" class="screen" style="display: block;">
    <div id="exportReminder">
        <span>⚠️ Back up your data now!</span>
        <button onclick="exportData()" style="background:var(--warning); color:#000; border:none; padding:6px 12px; border-radius:8px; font-weight:bold; font-size:10px;">EXPORT</button>
    </div>

    <div class="heatmap-container" id="freshnessHeatmap"></div>
    
    <div class="toggle-container">
        <button class="toggle-btn ppl active" onclick="setRoutine('Push', this)">PUSH</button>
        <button class="toggle-btn ppl" onclick="setRoutine('Pull', this)">PULL</button>
        <button class="toggle-btn ppl" onclick="setRoutine('Legs', this)">LEGS</button>
    </div>

    <div class="timer-container">
        <div id="timerDisplay">00:00</div>
        <div class="timer-controls">
            <button class="btn-secondary" onclick="addRest(30)">+30s</button>
            <button class="btn-secondary" onclick="addRest(60)">+1m</button>
            <button class="btn-secondary" style="color:var(--danger)" onclick="resetTimer()">RESET</button>
        </div>
        <button class="btn-primary" id="timerAction" onclick="toggleTimer()">START REST</button>
    </div>

    <select id="exSelect" onchange="updateGhostStats()"></select>
    <div id="ghostStats" style="background: rgba(0, 242, 254, 0.05); border: 1px dashed var(--accent); padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; color: var(--accent); display: none;"></div>
    
    <div id="logTable"></div>
    <button class="btn-secondary" onclick="addSetRow()">+ Add Set</button>
    <button class="btn-primary" style="margin-top:20px" onclick="saveWorkout()">LOG EXERCISE</button>
</div>

<!-- HISTORY SCREEN -->
<div id="historyScreen" class="screen">
    <div class="workout-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:white;">◀</button>
            <b id="calMonth"></b>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:white;">▶</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
    </div>
    <h3 id="selectedDateText" style="color: var(--accent); font-size: 16px;">Today</h3>
    <div id="dailyLogs"></div>
</div>

<!-- STATS SCREEN -->
<div id="statsScreen" class="screen">
    <div class="workout-card">
        <h4 style="margin:0 0 10px 0; font-size: 11px; color: var(--text-sub);">WEEKLY VOLUME (Target: 22 Sets)</h4>
        <div id="weeklyVolumeList"></div>
    </div>
    
    <div class="toggle-container">
        <button class="toggle-btn stat-ppl active" onclick="setStatsRoutine('Push', this)">PUSH</button>
        <button class="toggle-btn stat-ppl" onclick="setStatsRoutine('Pull', this)">PULL</button>
        <button class="toggle-btn stat-ppl" onclick="setStatsRoutine('Legs', this)">LEGS</button>
    </div>
    <select id="statsExSelect" onchange="renderAnalytics()"></select>
    <canvas id="drilldownChart"></canvas>
</div>

<!-- PROFILE SCREEN -->
<div id="profileScreen" class="screen">
    <h2 style="text-align:center;">Settings</h2>
    
    <div class="workout-card">
        <p style="margin-top:0; font-size:12px; color:var(--text-sub);">EXPORT REMINDER FREQUENCY</p>
        <select id="reminderInterval" onchange="saveReminderInterval()">
            <option value="30000">30 Seconds (Test)</option>
            <option value="604800000">7 Days</option>
            <option value="1296000000" selected>15 Days</option>
            <option value="2592000000">30 Days</option>
        </select>
    </div>

    <button class="btn-secondary" onclick="exportData()">EXPORT BACKUP (.JSON)</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    <button class="btn-secondary" onclick="document.getElementById('importFile').click()">IMPORT BACKUP</button>
    <button class="btn-secondary" style="color:var(--danger); margin-top:40px;" onclick="clearData()">WIPE ALL DATA</button>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="showScreen('workout')">🏋️</div>
    <div class="nav-item" onclick="showScreen('history')">📅</div>
    <div class="nav-item" onclick="showScreen('stats')">📊</div>
    <div class="nav-item" onclick="showScreen('profile')">👤</div>
</nav>

<script>
let calDate = new Date(), selectedDateStr = new Date().toDateString();
let timeLeft = 0, timerInterval = null, currentRoutine = 'Push', statsRoutine = 'Push';

// Your Updated Exercise List
const splitExercises = {
    'Push': ['Flat Bench Press', 'Incline DB Press', 'Incline Smith Press', 'Single-Arm Tricep Extension', 'Overhead Tricep Extension', 'Ovehead Press'],
    'Pull': ['Lat Pulldown', 'T-Bar Row', 'Iso-Lateral Low Row', 'Bicep Curls', 'Single Arm Reverse Curls', 'Rear-Delt Flies'],
    'Legs': ['Leg Extensions', 'Hack Squat', 'Hamstring Curl', 'RDL', 'Abductors', 'Calf Raises', 'ABs']
};

function saveReminderInterval() {
    localStorage.setItem('reminderInterval', document.getElementById('reminderInterval').value);
    checkExportReminder();
}

function checkExportReminder() {
    const last = localStorage.getItem('lastExportDate');
    const interval = parseInt(localStorage.getItem('reminderInterval')) || 1296000000;
    const reminderBar = document.getElementById('exportReminder');
    if(document.getElementById('reminderInterval')) document.getElementById('reminderInterval').value = interval;
    if (!last) { localStorage.setItem('lastExportDate', new Date().getTime()); return; }
    const diff = new Date().getTime() - parseInt(last);
    reminderBar.style.display = (diff >= interval) ? 'flex' : 'none';
}

function exportData() {
    const blob = new Blob([localStorage.getItem('gymLogs') || '[]'], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); 
    a.download = `backup_${new Date().toISOString().split('T')[0]}.json`; a.click();
    localStorage.setItem('lastExportDate', new Date().getTime());
    checkExportReminder();
}

function addSetRow() {
    const div = document.createElement('div');
    div.style = "display:grid; grid-template-columns: 1fr 1fr 40px; gap: 10px; margin-bottom: 10px;";
    div.innerHTML = `<input type="number" step="any" inputmode="decimal" placeholder="kg" class="ki"><input type="number" inputmode="numeric" placeholder="reps" class="ri"><button onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--danger); font-size:20px;">×</button>`;
    document.getElementById('logTable').appendChild(div);
}

function saveWorkout() {
    const ex = document.getElementById('exSelect').value;
    const sets = Array.from(document.querySelectorAll('#logTable div')).map(r => ({
        kg: parseFloat(r.querySelector('.ki').value), 
        reps: parseInt(r.querySelector('.ri').value),
    })).filter(s => s.kg > 0);
    
    if(!sets.length) return;
    let db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    db.push({ name: ex, routine: currentRoutine, date: new Date().toISOString(), sets });
    localStorage.setItem('gymLogs', JSON.stringify(db));
    
    const toast = document.getElementById('successToast');
    toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 2000);
    document.getElementById('logTable').innerHTML = ""; addSetRow();
    updateGhostStats(); updateHeatmap();
}

function updateExerciseDropdowns() {
    const isStats = document.getElementById('statsScreen').style.display === 'block';
    const routine = isStats ? statsRoutine : currentRoutine;
    const list = splitExercises[routine];
    const target = isStats ? 'statsExSelect' : 'exSelect';
    const dropdown = document.getElementById(target);
    dropdown.innerHTML = list.map(e => `<option value="${e}">${e}</option>`).join('');
    if(isStats) renderAnalytics(); else updateGhostStats();
}

function updateHeatmap() {
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    const container = document.getElementById('freshnessHeatmap'); container.innerHTML = '';
    ['Push', 'Pull', 'Legs'].forEach(r => {
        const last = db.filter(l => l.routine === r).sort((a,b) => new Date(b.date) - new Date(a.date))[0];
        const hrs = last ? Math.floor((new Date() - new Date(last.date)) / 3600000) : 999;
        const color = hrs > 48 ? "var(--success)" : (hrs > 24 ? "var(--warning)" : "var(--danger)");
        container.innerHTML += `<div class="heat-cell" style="border-color:${color}"><span class="heat-label">${r}</span><b style="color:${color}; font-size:12px;">${hrs > 48 ? 'Ready' : 'Sore'}</b></div>`;
    });
}

function updateWeeklyVolume() {
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    const oneWeekAgo = new Date(); oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
    const weeklyLogs = db.filter(l => new Date(l.date) > oneWeekAgo);
    const container = document.getElementById('weeklyVolumeList'); container.innerHTML = '';
    ['Push', 'Pull', 'Legs'].forEach(r => {
        const total = weeklyLogs.filter(l => l.routine === r).reduce((acc, curr) => acc + curr.sets.length, 0);
        const percent = Math.min((total / 22) * 100, 100);
        const color = total >= 22 ? "var(--gold)" : (total >= 15 ? "var(--accent)" : "var(--text-sub)");
        container.innerHTML += `<div style="margin-top:10px;"><div style="display:flex; justify-content:space-between; font-size:10px;"><span>${r}</span><b>${total}/22 Sets</b></div><div class="vol-target-bar"><div class="vol-progress" style="width:${percent}%; background-color:${color}"></div></div></div>`;
    });
}

function renderAnalytics() {
    const ex = document.getElementById('statsExSelect').value;
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]').filter(l => l.name === ex).sort((a,b) => new Date(a.date) - new Date(b.date));
    const canvas = document.getElementById('drilldownChart'); const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(!db.length) return;
    const weights = db.map(l => Math.max(...l.sets.map(s => s.kg)));
    ctx.strokeStyle = '#00f2fe'; ctx.lineWidth = 3; ctx.beginPath();
    db.forEach((l, i) => {
        const x = (i / (db.length - 1 || 1)) * (canvas.width - 40) + 20;
        const y = canvas.height - ((weights[i] / (Math.max(...weights) || 1)) * (canvas.height - 40)) - 20;
        if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id + 'Screen').style.display = 'block';
    if(id === 'workout') { updateHeatmap(); checkExportReminder(); updateExerciseDropdowns(); }
    if(id === 'history') renderCalendar();
    if(id === 'stats') { updateWeeklyVolume(); updateExerciseDropdowns(); }
    const map = {workout:0, history:1, stats:2, profile:3};
    document.querySelectorAll('.nav-item')[map[id]].classList.add('active');
}

function setRoutine(name, el) { currentRoutine = name; document.querySelectorAll('.ppl').forEach(b => b.classList.remove('active')); el.classList.add('active'); updateExerciseDropdowns(); }
function setStatsRoutine(name, el) { statsRoutine = name; document.querySelectorAll('.stat-ppl').forEach(b => b.classList.remove('active')); el.classList.add('active'); updateExerciseDropdowns(); }

function renderCalendar() {
    const grid = document.getElementById('calGrid');
    document.getElementById('calMonth').innerText = calDate.toLocaleString('default', { month: 'long', year: 'numeric' });
    grid.innerHTML = ['S','M','T','W','T','F','S'].map(d => `<div style="font-size:10px; color:var(--text-sub);">${d}</div>`).join('');
    const first = new Date(calDate.getFullYear(), calDate.getMonth(), 1).getDay();
    const days = new Date(calDate.getFullYear(), calDate.getMonth()+1, 0).getDate();
    const logs = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    for(let i=0; i<first; i++) grid.innerHTML += `<div></div>`;
    for(let d=1; d<=days; d++) {
        const dStr = new Date(calDate.getFullYear(), calDate.getMonth(), d).toDateString();
        const hasWork = logs.some(l => new Date(l.date).toDateString() === dStr);
        grid.innerHTML += `<div class="cal-date ${hasWork?'has-workout':''} ${dStr===selectedDateStr?'selected-date':''}" onclick="selectDate('${dStr}')">${d}</div>`;
    }
    renderDailyLogs();
}
function selectDate(str) { selectedDateStr = str; renderCalendar(); }
function renderDailyLogs() {
    const container = document.getElementById('dailyLogs');
    const logs = JSON.parse(localStorage.getItem('gymLogs') || '[]').filter(l => new Date(l.date).toDateString() === selectedDateStr);
    container.innerHTML = logs.map(l => `<div class="workout-card"><b>${l.name}</b><br><small style="color:var(--text-sub)">${l.sets.map(s => `${s.kg}kg x ${s.reps}`).join(' | ')}</small></div>`).join('') || '<p style="text-align:center; color:var(--text-sub)">No Entry</p>';
}
function updateGhostStats() {
    const ex = document.getElementById('exSelect').value;
    const last = JSON.parse(localStorage.getItem('gymLogs') || '[]').filter(l => l.name === ex).sort((a,b) => new Date(b.date) - new Date(a.date))[0];
    const ghost = document.getElementById('ghostStats');
    if(last) { ghost.style.display = 'block'; ghost.innerHTML = `👻 Last: ${last.sets[0].kg}kg x ${last.sets[0].reps}`; } else ghost.style.display = 'none';
}
function changeMonth(dir) { calDate.setMonth(calDate.getMonth() + dir); renderCalendar(); }
function clearData() { if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); } }
function importData(e) {
    const reader = new FileReader();
    reader.onload = (event) => { localStorage.setItem('gymLogs', event.target.result); location.reload(); };
    reader.readAsText(e.target.files[0]);
}

function addRest(s) { timeLeft += s; updateTimerDisplay(); }
function resetTimer() { timeLeft = 0; updateTimerDisplay(); clearInterval(timerInterval); timerInterval = null; }
function updateTimerDisplay() { document.getElementById('timerDisplay').innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`; }
function toggleTimer() {
    if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    else if(timeLeft > 0) {
        timerInterval = setInterval(() => { 
            if(timeLeft > 0) { timeLeft--; updateTimerDisplay(); } 
            else { resetTimer(); if(navigator.vibrate) navigator.vibrate([500,200,500]); }
        }, 1000);
    }
}

// SERVICE WORKER REGISTRATION (PWA Support)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("Service Worker Registered"));
}

updateExerciseDropdowns(); updateHeatmap(); addSetRow(); checkExportReminder();
</script>
</body>
</html>
