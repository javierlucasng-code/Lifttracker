<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --bg: #000000; --card: #111111; --accent: #00ff41; --selected-pill: #003311; --text-main: #f0f6fc; 
            --text-sub: #8b949e; --border: #333333; 
            --input-bg: #0a0a0a; --danger: #ff4d4d; --success: #00ff41; --warning: #e3b341;
            --glass-bg: rgba(15, 15, 15, 0.85);
            --pull: #0088ff;
            --legs: #ff4d4d;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text-main); 
            padding-top: calc(75px + env(safe-area-inset-top));
            padding-bottom: calc(115px + env(safe-area-inset-bottom)); overflow-x: hidden; 
        }

        .top-header-nav {
            position: fixed; top: 0; left: 0; right: 0;
            height: 65px; background: var(--glass-bg);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            padding: 0 20px; z-index: 3000;
        }
        .app-logo { font-weight: 900; font-size: 18px; letter-spacing: -1px; }

        .screen { padding: 15px; display: none; max-width: 500px; margin: auto; animation: fadeIn 0.1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .calendar-header { margin-bottom: 15px; cursor: pointer; }
        .month-label { color: var(--accent); font-weight: bold; font-size: 22px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        
        .scroll-calendar { 
            display: flex; gap: 12px; padding: 10px 0 20px 0;
            overflow-x: auto; scroll-snap-type: x mandatory; 
            -webkit-overflow-scrolling: touch; scrollbar-width: none; 
        }
        .scroll-calendar::-webkit-scrollbar { display: none; }

        .date-pill {
            min-width: 55px; height: 85px; background: var(--card); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; border: 1px solid var(--border); transition: 0.2s;
            scroll-snap-align: start; position: relative;
        }
        .date-pill.active { background: var(--selected-pill); border-color: var(--accent); transform: scale(1.05); }
        .date-pill .date-circle { width: 28px; height: 28px; background: var(--input-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; margin-top: 5px; }

        .remove-set-btn {
            background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3);
            color: var(--danger); border-radius: 50%; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; align-self: center;
        }

        .btn-primary { background: var(--accent); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-bottom: 15px; }
        .btn-secondary { background: var(--card); color: white; border: 1px solid var(--border); width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 12px; }
        
        .workout-card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); margin-bottom: 12px; position: relative; overflow: hidden; }
        .label-text { font-size: 11px; color: var(--text-sub); text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }

        .history-day-group { margin-bottom: 10px; border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
        .history-day-header { 
            background: var(--card); padding: 15px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; border-bottom: 1px solid var(--border);
        }
        .history-content { display: none; padding: 10px; background: var(--bg); }

        .toggle-container { display: flex; background: var(--input-bg); border-radius: 10px; padding: 3px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; z-index: 1; overflow: hidden;}
        .toggle-slider { position: absolute; top: 3px; left: 3px; height: calc(100% - 6px); width: calc(33.33% - 4px); background: #1a1a1a; border-radius: 7px; transition: 0.3s; z-index: -1; }
        .pos-push { transform: translateX(0); } .pos-pull { transform: translateX(100%); } .pos-legs { transform: translateX(200%); }

        .navbar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; display: flex; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; padding: 12px 0; justify-content: space-around; z-index: 2000; }
        .nav-item { color: #555; cursor: pointer; flex: 1; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .nav-item svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2.2; fill: none; }
        .nav-item.active { color: var(--accent); transform: translateY(-4px); }
        .timer-btn { background: var(--input-bg); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 8px; font-size: 11px; flex: 1; font-weight: bold; }
        
        .history-search-container { margin-bottom: 15px; }
        .history-search-container select { width: 100%; padding: 12px; border-radius: 10px; background: var(--input-bg); color: white; border: 1px solid var(--border); font-size: 14px; outline: none; }
    </style>
</head>
<body>

<nav class="top-header-nav">
    <div class="app-logo">ELITE<span style="color:var(--accent)">PRO</span></div>
</nav>

<div id="workoutScreen" class="screen" style="display: block;">
    <div class="calendar-header">
        <span class="label-text">Select Date</span>
        <div class="month-label"><span id="currentDateDisplay">Today</span> <span style="font-size: 12px; color: var(--text-sub);">▼</span></div>
    </div>
    <div class="scroll-calendar" id="weekBar"></div>
    
    <div class="toggle-container">
        <div id="mainSlider" class="toggle-slider pos-push"></div>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Push', 'mainSlider', 'pos-push')">PUSH</button>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Pull', 'mainSlider', 'pos-pull')">PULL</button>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Legs', 'mainSlider', 'pos-legs')">LEGS</button>
    </div>

    <select id="exSelect" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); background:var(--input-bg); color:white; margin-bottom:15px; font-size: 16px;"></select>
    <div id="logTable"></div>
    <button class="btn-secondary" onclick="addSetRow()">+ Add Set</button>
    <button class="btn-primary" onclick="saveWorkout()">LOG SESSION</button>

    <div class="workout-card" style="padding: 15px;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
            <div>
                <span class="label-text" style="margin:0">Rest Timer</span>
                <div id="timerDisplay" style="font-size: 32px; font-weight: 900; color: var(--accent); font-family: monospace; line-height: 1;">00:00</div>
            </div>
            <button id="timerToggle" onclick="toggleTimer()" style="background: var(--selected-pill); border: 1px solid var(--accent); color: var(--accent); padding: 12px 25px; border-radius: 12px; font-weight: 900; font-size: 14px;">START</button>
        </div>
        <div style="display: flex; gap: 6px;">
            <button class="timer-btn" onclick="adjustTimer(-10)">-10s</button>
            <button class="timer-btn" onclick="adjustTimer(10)">+10s</button>
            <button class="timer-btn" onclick="adjustTimer(60)">+1m</button>
            <button class="timer-btn" style="border-color: var(--danger); color: var(--danger);" onclick="resetTimer()">RESET</button>
        </div>
    </div>
</div>

<div id="historyScreen" class="screen">
    <h2 style="color: var(--accent);">History</h2>
    <div class="history-search-container">
        <span class="label-text">Search by Month</span>
        <select id="monthFilter" onchange="renderHistory()">
            <option value="all">Show All Time</option>
            <option value="0">January</option>
            <option value="1">February</option>
            <option value="2">March</option>
            <option value="3">April</option>
            <option value="4">May</option>
            <option value="5">June</option>
            <option value="6">July</option>
            <option value="7">August</option>
            <option value="8">September</option>
            <option value="9">October</option>
            <option value="10">November</option>
            <option value="11">December</option>
        </select>
    </div>
    <div id="historyLogs"></div>
</div>

<div id="statsScreen" class="screen">
    <h2 style="color: var(--accent);">Performance</h2>
    <div id="statsList"></div>
</div>

<div id="weightScreen" class="screen">
    <h2 style="color: var(--accent);">Weight Tracker</h2>
    <div class="workout-card" style="padding: 20px;">
        <span class="label-text">Body Weight Progression</span>
        <div style="height: 250px; margin-top: 10px;"><canvas id="weightChart"></canvas></div>
    </div>
    <div class="workout-card" style="padding: 15px;">
        <span class="label-text">Update Weight for <span id="weightDateLabel">Today</span></span>
        <div style="display:flex; gap:10px;">
            <input type="number" id="bodyWeightInput" placeholder="kg" style="flex:1; padding:14px; border-radius:12px; border:1px solid var(--border); background:var(--input-bg); color:white;">
            <button class="btn-primary" style="margin:0; width:auto; padding:0 20px;" onclick="saveWeight()">LOG</button>
        </div>
    </div>
</div>

<div id="profileScreen" class="screen">
    <h2 style="color: var(--accent);">Settings</h2>
    <button class="btn-secondary" onclick="localStorage.clear(); location.reload();">CLEAR DATA</button>
</div>

<nav class="navbar">
    <div class="nav-item active" data-id="workout" onclick="showScreen('workout')"><svg viewBox="0 0 24 24"><path d="M6 12h12M6 8h12M6 16h12M5 4v16M19 4v16"/></svg></div>
    <div class="nav-item" data-id="history" onclick="showScreen('history')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/></svg></div>
    <div class="nav-item" data-id="stats" onclick="showScreen('stats')"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></div>
    <div class="nav-item" data-id="weight" onclick="showScreen('weight')"><svg viewBox="0 0 24 24"><path d="M20 12h2M2 12h2M12 2v2M12 20v2M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/></svg></div>
    <div class="nav-item" data-id="profile" onclick="showScreen('profile')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
</nav>

<script>
let selectedDate = new Date();
let currentRoutine = 'Push';
let weightChart = null;
let perfCharts = {}; 
let timeLeft = 0, timerRunning = false, timerInterval;

const splitExercises = {
    'Push': ['Bench Press', 'Incline Press', 'OHP'],
    'Pull': ['Lat Pulldown', 'Rows', 'Bicep Curls'],
    'Legs': ['Squat', 'Leg Press', 'Calf Raises']
};

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id + 'Screen').style.display = 'block';
    document.querySelector(`.nav-item[data-id="${id}"]`).classList.add('active');
    
    if(id === 'workout') renderWeekBar();
    if(id === 'weight') renderWeightChart();
    if(id === 'stats') renderPerformanceStats();
    if(id === 'history') renderHistory();
}

function renderWeekBar() {
    const bar = document.getElementById('weekBar');
    bar.innerHTML = '';
    document.getElementById('currentDateDisplay').innerText = selectedDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    const start = new Date(selectedDate); start.setDate(selectedDate.getDate() - 5);
    for(let i=0; i<11; i++) {
        const d = new Date(start); d.setDate(start.getDate() + i);
        const p = document.createElement('div');
        p.className = `date-pill ${d.toDateString() === selectedDate.toDateString() ? 'active' : ''}`;
        p.innerHTML = `<span class="label-text" style="margin:0">${d.toLocaleDateString(undefined,{weekday:'short'})}</span><div class="date-circle">${d.getDate()}</div>`;
        p.onclick = () => { selectedDate = d; renderWeekBar(); };
        bar.appendChild(p);
    }
}

function saveWorkout() {
    const sets = Array.from(document.getElementById('logTable').children).map(row => ({
        weight: row.children[0].value,
        reps: row.children[1].value
    })).filter(s => s.weight && s.reps);

    if (sets.length === 0) return alert("Please enter weight and reps!");

    const log = {
        id: Date.now(),
        date: selectedDate.toISOString(),
        exercise: document.getElementById('exSelect').value,
        sets: sets
    };

    let history = JSON.parse(localStorage.getItem('workoutLogs') || '[]');
    history.push(log);
    localStorage.setItem('workoutLogs', JSON.stringify(history));
    
    alert("Session Logged!");
    document.getElementById('logTable').innerHTML = '';
    addSetRow();
}

function renderHistory() {
    const logs = JSON.parse(localStorage.getItem('workoutLogs') || '[]');
    const container = document.getElementById('historyLogs');
    const filterMonth = document.getElementById('monthFilter').value;
    
    container.innerHTML = '';

    // Filter logs if a specific month is selected
    const filteredLogs = filterMonth === 'all' 
        ? logs 
        : logs.filter(log => new Date(log.date).getMonth() == filterMonth);

    if (filteredLogs.length === 0) {
        container.innerHTML = '<p style="color:var(--text-sub); text-align:center; padding:20px;">No workouts found for this period.</p>';
        return;
    }

    // Group logs by Date
    const grouped = filteredLogs.reduce((acc, log) => {
        const d = new Date(log.date).toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
        if (!acc[d]) acc[d] = [];
        acc[d].push(log);
        return acc;
    }, {});

    Object.keys(grouped).reverse().forEach(dateKey => {
        const dayLogs = grouped[dateKey];
        const dayGroup = document.createElement('div');
        dayGroup.className = 'history-day-group';
        
        dayGroup.innerHTML = `
            <div class="history-day-header" onclick="toggleHistoryDay(this)">
                <span>${dateKey}</span>
                <span style="font-size:12px; color:var(--accent)">${dayLogs.length} Exercises ▼</span>
            </div>
            <div class="history-content">
                ${dayLogs.map(log => `
                    <div class="workout-card" style="padding: 15px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <span class="label-text" style="color:var(--accent)">${log.exercise}</span>
                        </div>
                        <div style="display:flex; flex-wrap:wrap; gap:10px;">
                            ${log.sets.map((s, i) => `<div style="background:var(--input-bg); padding:5px 10px; border-radius:5px; font-size:12px;">S${i+1}: ${s.weight}kg x ${s.reps}</div>`).join('')}
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        container.appendChild(dayGroup);
    });
}

function toggleHistoryDay(header) {
    const content = header.nextElementSibling;
    const isVisible = content.style.display === 'block';
    content.style.display = isVisible ? 'none' : 'block';
    header.querySelector('span:last-child').innerText = isVisible ? `${header.nextElementSibling.children.length} Exercises ▼` : `${header.nextElementSibling.children.length} Exercises ▲`;
}

function renderPerformanceStats() {
    const logs = JSON.parse(localStorage.getItem('workoutLogs') || '[]');
    const statsContainer = document.getElementById('statsList');
    statsContainer.innerHTML = '';
    
    const exerciseHistory = {};
    logs.forEach(log => {
        if (!exerciseHistory[log.exercise]) exerciseHistory[log.exercise] = [];
        let dailyMax1RM = 0;
        log.sets.forEach(set => {
            const orm = parseFloat(set.weight) * (1 + parseFloat(set.reps) / 30);
            if (orm > dailyMax1RM) dailyMax1RM = orm;
        });
        exerciseHistory[log.exercise].push({ 
            date: new Date(log.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }),
            val: Math.round(dailyMax1RM)
        });
    });

    if (Object.keys(exerciseHistory).length === 0) {
        statsContainer.innerHTML = '<p style="color:var(--text-sub); text-align:center">No workout data found.</p>';
        return;
    }

    for (const [exercise, dataPoints] of Object.entries(exerciseHistory)) {
        const card = document.createElement('div');
        card.className = 'workout-card';
        card.style.padding = '15px';
        const canvasId = `chart-${exercise.replace(/\s+/g, '-').toLowerCase()}`;
        
        card.innerHTML = `
            <span class="label-text">${exercise} Progress (1RM)</span>
            <div style="height: 150px; margin-top: 10px;">
                <canvas id="${canvasId}"></canvas>
            </div>
        `;
        statsContainer.appendChild(card);

        const ctx = document.getElementById(canvasId).getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: dataPoints.map(d => d.date),
                datasets: [{
                    data: dataPoints.map(d => d.val),
                    borderColor: '#00ff41',
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 3,
                    pointBackgroundColor: '#00ff41',
                    fill: true,
                    backgroundColor: 'rgba(0, 255, 65, 0.05)'
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#222' }, ticks: { color: '#8b949e', font: { size: 10 } } },
                    x: { grid: { display: false }, ticks: { color: '#8b949e', font: { size: 10 } } }
                }
            }
        });
    }
}

function saveWeight() {
    const val = parseFloat(document.getElementById('bodyWeightInput').value);
    if(!val) return;
    let db = JSON.parse(localStorage.getItem('bodyWeightLogs') || '[]');
    db.push({ date: selectedDate.toISOString(), weight: val });
    localStorage.setItem('bodyWeightLogs', JSON.stringify(db));
    renderWeightChart();
    alert("Weight Logged!");
}

function renderWeightChart() {
    const db = JSON.parse(localStorage.getItem('bodyWeightLogs') || '[]');
    const sorted = db.sort((a,b) => new Date(a.date) - new Date(b.date));
    const ctx = document.getElementById('weightChart').getContext('2d');
    if(weightChart) weightChart.destroy();
    weightChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: sorted.map(l => new Date(l.date).toLocaleDateString(undefined, {month:'short', day:'numeric'})),
            datasets: [{ data: sorted.map(l => l.weight), borderColor: '#00ff41', tension: 0.3, fill: true, backgroundColor: 'rgba(0, 255, 65, 0.1)' }]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
}

function setRoutine(n, s, p) { currentRoutine = n; document.getElementById(s).className = 'toggle-slider ' + p; updateDropdown(); }
function updateDropdown() { document.getElementById('exSelect').innerHTML = splitExercises[currentRoutine].map(e => `<option>${e}</option>`).join(''); }
function addSetRow() {
    const div = document.createElement('div');
    div.style = "display:grid; grid-template-columns: 1fr 1fr 40px; gap:10px; margin-bottom:10px;";
    div.innerHTML = `<input type="number" placeholder="kg" style="padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:white;"> <input type="number" placeholder="reps" style="padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:white;"> <button class="remove-set-btn" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('logTable').appendChild(div);
}

function toggleTimer() {
    if(timerRunning) { clearInterval(timerInterval); document.getElementById('timerToggle').innerText = "START"; }
    else { if(timeLeft <= 0) timeLeft = 90; timerInterval = setInterval(() => { if(timeLeft > 0) { timeLeft--; updateDisplay(); } else { clearInterval(timerInterval); resetTimer(); } }, 1000); document.getElementById('timerToggle').innerText = "STOP"; }
    timerRunning = !timerRunning;
}
function updateDisplay() { const m=Math.floor(timeLeft/60), s=timeLeft%60; document.getElementById('timerDisplay').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
function adjustTimer(v) { timeLeft = Math.max(0, timeLeft + v); updateDisplay(); }
function resetTimer() { clearInterval(timerInterval); timeLeft=0; timerRunning=false; updateDisplay(); document.getElementById('timerToggle').innerText = "START"; }

updateDropdown();
addSetRow();
renderWeekBar();
</script>
</body>
</html>
