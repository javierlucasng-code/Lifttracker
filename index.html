<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --bg: #000000; --card: #111111; --accent: #00ff41; --selected-pill: #003311; --text-main: #f0f6fc; 
            --text-sub: #8b949e; --border: #333333; 
            --input-bg: #0a0a0a; --danger: #ff4d4d; --success: #00ff41; --warning: #e3b341;
            --glass-bg: rgba(15, 15, 15, 0.75);
        }
        * { box-sizing: border-box; }

        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text-main); 
            padding-bottom: calc(115px + env(safe-area-inset-bottom)); overflow-x: hidden; 
        }

        .screen { padding: 15px; display: none; max-width: 500px; margin: auto; animation: fadeIn 0.1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- TIMER STYLES --- */
        .timer-container {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 15px; padding: 12px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .timer-display { font-size: 22px; font-weight: 900; color: var(--accent); font-family: monospace; }
        .timer-controls { display: flex; gap: 4px; }
        .timer-btn { background: var(--input-bg); border: 1px solid var(--border); color: white; padding: 8px 6px; border-radius: 8px; font-size: 10px; cursor: pointer; font-weight: bold; min-width: 45px; }

        /* --- UI ELEMENTS --- */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; position: relative; }
        .month-label { color: var(--accent); font-weight: bold; font-size: 14px; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        
        .scroll-calendar { display: flex; gap: 8px; padding-bottom: 15px; }

        .date-pill {
            min-width: 45px; height: 75px; background: var(--card); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; border: 1px solid var(--border); transition: 0.2s;
        }
        .date-pill.active { background: var(--selected-pill); border-color: var(--accent); }
        .date-pill .date-circle { width: 28px; height: 28px; background: var(--input-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }

        .toggle-container { display: flex; background: var(--input-bg); border-radius: 10px; padding: 3px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; z-index: 1; overflow: hidden;}
        .toggle-slider { position: absolute; top: 3px; left: 3px; height: calc(100% - 6px); width: calc(33.33% - 4px); background: #1a1a1a; border-radius: 7px; transition: 0.3s; z-index: -1; }
        .pos-push { transform: translateX(0); } .pos-pull { transform: translateX(100%); } .pos-legs { transform: translateX(200%); }

        select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: white; margin-bottom: 12px; font-size: 15px; outline: none; appearance: none; }
        .set-row { display: grid; grid-template-columns: 1fr 1fr 30px; gap: 12px; margin-bottom: 12px; align-items: center; }
        .set-row input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: white; font-size: 15px; }

        .btn-primary { background: var(--accent); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; }
        .btn-secondary { background: var(--card); color: white; border: 1px solid var(--border); width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 12px; font-size: 14px; }
        .btn-danger { background: rgba(255, 77, 77, 0.05); color: var(--danger); border: 1px solid var(--danger); width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; margin-top: 10px; font-weight: 900; }

        .workout-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 12px; }
        .label-text { font-size: 11px; color: var(--text-sub); text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }

        .navbar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; display: flex; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; padding: 12px 0; justify-content: space-around; z-index: 2000; }
        .nav-item { color: #555; cursor: pointer; flex: 1; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .nav-item svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2.2; fill: none; }
        .nav-item.active { color: var(--accent); transform: translateY(-4px); }
    </style>
</head>
<body>

<!-- Workout Screen -->
<div id="workoutScreen" class="screen" style="display: block;">
    <div class="calendar-header" style="margin-bottom: 5px;">
        <div style="display: flex; flex-direction: column;">
            <span class="label-text" style="margin-bottom: 2px;">Selected Date</span>
            <div class="month-label" onclick="triggerDatePicker()" style="cursor: pointer; font-size: 18px;">
                <span id="currentDateDisplay">Today</span>
                <span style="font-size: 12px; margin-left: 5px;">▼</span>
            </div>
        </div>
        <input type="date" id="hiddenDatePicker" onchange="jumpToSpecificDate(this.value)" style="position: absolute; opacity: 0; pointer-events: none;">
    </div>

    <div class="scroll-calendar" id="weekBar" style="justify-content: space-between; padding: 10px 0;"></div>
    
    <div id="freshnessHeatmap" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px;"></div>
    
    <div class="toggle-container">
        <div id="mainSlider" class="toggle-slider pos-push"></div>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Push', 'mainSlider', 'pos-push')">PUSH</button>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Pull', 'mainSlider', 'pos-pull')">PULL</button>
        <button class="toggle-btn" style="flex:1; border:none; padding:10px; background:none; color:var(--text-sub); font-weight:800; font-size:11px;" onclick="setRoutine('Legs', 'mainSlider', 'pos-legs')">LEGS</button>
    </div>
    
    <select id="exSelect"></select>
    <div id="logTable"></div>
    <button class="btn-secondary" onclick="addSetRow()">+ Add Set</button>

    <!-- Updated Timer UI -->
    <div class="timer-container">
        <div>
            <span class="label-text" style="margin:0">Rest</span>
            <div id="timerDisplay" class="timer-display">00:00</div>
        </div>
        <div class="timer-controls">
            <button class="timer-btn" onclick="adjustTimer(-30)">-30s</button>
            <button id="timerToggle" class="timer-btn" style="color:var(--accent)" onclick="toggleTimer()">START</button>
            <button class="timer-btn" onclick="adjustTimer(30)">+30s</button>
            <button class="timer-btn" style="color:var(--text-sub)" onclick="resetTimer()">RESET</button>
        </div>
    </div>
    
    <button class="btn-primary" onclick="saveWorkout()">LOG SESSION</button>
</div>

<!-- History Screen -->
<div id="historyScreen" class="screen">
    <h2 style="color: var(--accent); margin-bottom: 20px;">History</h2>
    <div id="historyLogs"></div>
</div>

<!-- Stats Screen -->
<div id="statsScreen" class="screen">
    <h2 style="color: var(--accent); margin-bottom: 20px;">Analytics</h2>
    <div class="workout-card"><canvas id="progressChart" style="width: 100%; height: 250px;"></canvas></div>
</div>

<!-- Profile Screen -->
<div id="profileScreen" class="screen">
    <h2 style="color: var(--accent); margin-top: 10px; margin-bottom: 20px;">Account Management</h2>
    <div class="workout-card">
        <button class="btn-secondary" onclick="exportData()">DOWNLOAD JSON BACKUP</button>
        <label for="importFile" class="btn-secondary" style="cursor:pointer; display:block; text-align:center; padding: 15px; margin-top: 10px;">LOAD DATA FROM FILE</label>
        <input type="file" id="importFile" style="display:none;" onchange="importData(event)">
        <button class="btn-danger" onclick="resetDatabase()">RESET ALL DATA</button>
    </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="showScreen('workout')"><svg viewBox="0 0 24 24"><path d="M6 12h12M6 8h12M6 16h12M2 12h2M20 12h2M5 4v16M19 4v16"/></svg></div>
    <div class="nav-item" onclick="showScreen('history')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
    <div class="nav-item" onclick="showScreen('stats')"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
    <div class="nav-item" onclick="showScreen('profile')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
</nav>

<script>
let currentRoutine = 'Push';
let timeLeft = 0; // Starts at 0
let timerRunning = false;
let timerInterval;
let selectedDate = new Date(); 

const splitExercises = {
    'Push': ['Flat Bench Press', 'Incline DB Press', 'Incline Smith Press', 'Tricep Extension', 'Overhead Press'],
    'Pull': ['Lat Pulldown', 'T-Bar Row', 'Low Row', 'Bicep Curls', 'Reverse Curls'],
    'Legs': ['Leg Extensions', 'Hack Squat', 'Hamstring Curl', 'RDL', 'Abductors', 'Calf Raises']
};

function triggerDatePicker() { document.getElementById('hiddenDatePicker').showPicker(); }

function jumpToSpecificDate(val) {
    if(!val) return;
    selectedDate = new Date(val);
    renderWeekBar();
}

function renderWeekBar() {
    const weekBar = document.getElementById('weekBar');
    const dateDisplay = document.getElementById('currentDateDisplay');
    weekBar.innerHTML = '';
    const options = { month: 'short', day: 'numeric', year: 'numeric' };
    dateDisplay.innerText = selectedDate.toLocaleDateString(undefined, options);
    const startOfWeek = new Date(selectedDate);
    startOfWeek.setDate(selectedDate.getDate() - selectedDate.getDay());
    for (let i = 0; i < 7; i++) {
        const day = new Date(startOfWeek);
        day.setDate(startOfWeek.getDate() + i);
        const isSelected = day.toDateString() === selectedDate.toDateString();
        const pill = document.createElement('div');
        pill.className = `date-pill ${isSelected ? 'active' : ''}`;
        pill.style.flex = "1"; pill.style.margin = "0 2px";
        pill.onclick = () => { selectedDate = day; renderWeekBar(); };
        pill.innerHTML = `<span class="label-text" style="margin:0; font-size:9px;">${day.toLocaleDateString('en-US', { weekday: 'short' })}</span><div class="date-circle" style="width:24px; height:24px; font-size:11px;">${day.getDate()}</div>`;
        weekBar.appendChild(pill);
    }
}

function setRoutine(name, sliderId, posClass) {
    currentRoutine = name;
    document.getElementById(sliderId).className = 'toggle-slider ' + posClass;
    updateDropdown();
}

function updateDropdown() {
    const select = document.getElementById('exSelect');
    select.innerHTML = splitExercises[currentRoutine].map(e => `<option value="${e}">${e}</option>`).join('');
}

function addSetRow() {
    const div = document.createElement('div');
    div.className = 'set-row';
    div.innerHTML = `<input type="number" placeholder="kg" class="ki"><input type="number" placeholder="reps" class="ri"><button style="background:none; border:none; color:var(--danger); font-size:18px;" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('logTable').appendChild(div);
}

function saveWorkout() {
    const ex = document.getElementById('exSelect').value;
    const sets = Array.from(document.querySelectorAll('.set-row')).map(r => ({
        kg: parseFloat(r.querySelector('.ki').value) || 0, 
        reps: parseInt(r.querySelector('.ri').value) || 0
    })).filter(s => s.kg > 0);
    if(!sets.length) return;
    let db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    db.push({ name: ex, routine: currentRoutine, date: selectedDate.toISOString(), sets });
    localStorage.setItem('gymLogs', JSON.stringify(db));
    document.getElementById('logTable').innerHTML = ""; addSetRow();
    updateHeatmap();
    alert(`Logged to ${selectedDate.toLocaleDateString()}`);
}

// --- UPDATED TIMER LOGIC ---
function updateTimerDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
}

function toggleTimer() {
    const btn = document.getElementById('timerToggle');
    if (timerRunning) { 
        clearInterval(timerInterval); 
        btn.innerText = "START"; 
        btn.style.color = "var(--accent)"; 
    } else {
        if (timeLeft <= 0) return; // Don't start if clock is at 0
        timerInterval = setInterval(() => { 
            if (timeLeft > 0) { 
                timeLeft--; 
                updateTimerDisplay(); 
            } else { 
                clearInterval(timerInterval); 
                alert("Rest over!"); 
                resetTimer(); 
            }
        }, 1000);
        btn.innerText = "STOP"; 
        btn.style.color = "var(--danger)";
    }
    timerRunning = !timerRunning;
}

function resetTimer() { 
    clearInterval(timerInterval); 
    timerRunning = false; 
    timeLeft = 0; // Resets to 0
    updateTimerDisplay(); 
    document.getElementById('timerToggle').innerText = "START"; 
    document.getElementById('timerToggle').style.color = "var(--accent)"; 
}

function adjustTimer(amt) { 
    timeLeft = Math.max(0, timeLeft + amt); 
    updateTimerDisplay(); 
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id + 'Screen').style.display = 'block';
    const idx = {workout:0, history:1, stats:2, profile:3}[id];
    document.querySelectorAll('.nav-item')[idx].classList.add('active');
    if(id === 'history') renderHistory();
    if(id === 'stats') renderStats();
}

function updateHeatmap() {
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    const container = document.getElementById('freshnessHeatmap');
    container.innerHTML = '';
    ['Push', 'Pull', 'Legs'].forEach(r => {
        const last = db.filter(l => l.routine === r).sort((a,b) => new Date(b.date) - new Date(a.date))[0];
        const hrs = last ? Math.floor((new Date() - new Date(last.date)) / 3600000) : 999;
        const color = hrs > 48 ? "var(--success)" : (hrs > 24 ? "var(--warning)" : "var(--danger)");
        container.innerHTML += `<div style="border:1px solid ${color}; padding:10px; border-radius:12px; text-align:center; background:var(--input-bg);"><span class="label-text" style="color:var(--text-sub); font-size:9px; margin:0;">${r}</span><b style="color:${color}; font-size:13px;">${hrs > 48 ? 'GO' : hrs+'h'}</b></div>`;
    });
}

function renderHistory() {
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    document.getElementById('historyLogs').innerHTML = db.slice().reverse().map(l => `<div class="workout-card"><span class="label-text">${new Date(l.date).toLocaleDateString()} — ${l.routine}</span><div style="display:flex; justify-content:space-between;"><b>${l.name}</b> <span>${l.sets.length} Sets</span></div></div>`).join('');
}

function renderStats() {
    const db = JSON.parse(localStorage.getItem('gymLogs') || '[]');
    const ctx = document.getElementById('progressChart').getContext('2d');
    if(window.myChart) window.myChart.destroy();
    window.myChart = new Chart(ctx, { type: 'line', data: { labels: db.slice(-10).map(l => new Date(l.date).toLocaleDateString()), datasets: [{ label: 'Volume', data: db.slice(-10).map(l => l.sets.reduce((a,b)=> a+(b.kg*b.reps),0)), borderColor: '#00ff41', tension: 0.4 }] }, options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } } });
}

function exportData() {
    const blob = new Blob([localStorage.getItem('gymLogs') || '[]'], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `elite_backup.json`; a.click();
}

function importData(event) {
    const reader = new FileReader();
    reader.onload = (e) => { localStorage.setItem('gymLogs', e.target.result); location.reload(); };
    reader.readAsText(event.target.files[0]);
}

function resetDatabase() { if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); } }

renderWeekBar(); updateDropdown(); addSetRow(); updateHeatmap();
</script>
</body>
</html>
